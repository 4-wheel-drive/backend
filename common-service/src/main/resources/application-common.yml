spring:
  redis:
    host: ${REDIS_IP}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    timeout: 2000

  datasource:
    url: jdbc:mariadb://127.0.0.1:3307/modular1
    driver-class-name: org.mariadb.jdbc.Driver
    username: admin
    password: admin1024

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  sql:
    init:
      mode: always

logging:
  level:
    root: INFO
