spring:
  config:
    import:
      - optional:classpath:application-common.yml
  application:
    name: strategy-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      database: pda-db
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MariaDBDialect}
server:
  port: 8081
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
  temperature: 0.4
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    db:
      enabled: false
    defaults:
      enabled: false
